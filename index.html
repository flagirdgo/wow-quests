<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Quest Log</title>

<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap" rel="stylesheet">

<style>

body{
background-image:url("https://wow.zamimg.com/uploads/screenshots/normal/944050.jpg");
background-size:cover;
background-position:center;
font-family:'Uncial Antiqua', serif;
display:flex;
justify-content:center;
margin-top:40px;
}

.layout{
display:flex;
gap:40px;
align-items:flex-start;
}

.avatar{
width:200px;
border:8px solid #5b3a1a;
box-shadow:0 0 30px black;
}

.panel{
background:#e0c38c;
width:700px;
min-height:500px;
padding:35px;
border:8px solid #5b3a1a;
box-shadow:0 0 40px black;
}

h1{
text-align:center;
color:#4a3417;
margin-bottom:20px;
}

.quest{
display:flex;
align-items:center;
background:#f3e2b5;
border:3px solid #a27b3f;
padding:10px;
margin:8px 0;
}

.quest span{
margin-left:10px;
}

.completed{
text-decoration:line-through;
opacity:0.6;
}

input[type="text"]{
width:70%;
padding:8px;
border:3px solid #a27b3f;
background:#fff5d6;
font-family:'Uncial Antiqua', serif;
}

button{
background:#7a5a2b;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
font-family:'Uncial Antiqua', serif;
}

.stats{
margin-top:20px;
display:flex;
justify-content:space-between;
}

.xpbar{
margin-top:10px;
background:#5b3a1a;
height:22px;
}

.xpfill{
background:#d4af37;
height:100%;
width:0%;
}

</style>

</head>

<body>

<div class="layout">

<img class="avatar" src="tauren.png">

<div class="panel">

<h1>📜 Quest Log</h1>

<div id="quests"></div>

<input id="newQuest" placeholder="Nouvelle quête...">
<button onclick="addQuest()">Accepter</button>

<div class="stats">
<div>Niveau <span id="level">1</span></div>
<div>💰 Or : <span id="gold">0</span></div>
</div>

<div class="xpbar">
<div id="xpfill" class="xpfill"></div>
</div>

</div>
</div>

<audio id="acceptSound" src="quest_accept.mp3"></audio> <audio id="completeSound" src="quest_complete.mp3"></audio>

<script>

let xp=0
let level=1
let gold=0

function save(){
localStorage.setItem("quests",document.getElementById("quests").innerHTML)
localStorage.setItem("xp",xp)
localStorage.setItem("level",level)
localStorage.setItem("gold",gold)
}

function load(){

if(localStorage.getItem("quests")){
document.getElementById("quests").innerHTML=localStorage.getItem("quests")
xp=parseInt(localStorage.getItem("xp")) || 0
level=parseInt(localStorage.getItem("level")) || 1
gold=parseInt(localStorage.getItem("gold")) || 0

document.getElementById("level").innerText=level
document.getElementById("gold").innerText=gold

updateXP()
}

}

function updateXP(){

if(xp>=100){
xp=0
level++
document.getElementById("level").innerText=level
alert("LEVEL UP !")
}

document.getElementById("xpfill").style.width=xp+"%"
save()

}

function addQuest(){

let text=document.getElementById("newQuest").value
if(text==="")return

document.getElementById("acceptSound").play()

let quest=document.createElement("div")
quest.className="quest"

let check=document.createElement("input")
check.type="checkbox"

let label=document.createElement("span")
label.innerText=text

check.onclick=()=>{
label.classList.toggle("completed")
xp+=20
gold+=5
document.getElementById("gold").innerText=gold
updateXP()
document.getElementById("completeSound").play()
}

quest.appendChild(check)
quest.appendChild(label)

document.getElementById("quests").appendChild(quest)

document.getElementById("newQuest").value=""

save()

}

load()

</script>

</body>
</html>
